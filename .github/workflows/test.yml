name: Test

on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CAPYBARACLAW_CI: "1"
    steps:
      - name: Checkout capybaraclaw
        uses: actions/checkout@v6
      - name: Setup JVM and sbt
        uses: VirtusLab/scala-cli-setup@v1
        with:
          jvm: 25
          apps: sbt
      - name: Check formatting
        run: sbt scalafmtCheckAll
      - name: Checkout tacit
        uses: actions/checkout@v6
        with:
          repository: lampepfl/tacit
          path: tacit
      - name: Publish tacit locally
        working-directory: tacit
        run: sbt publishLocal
      - name: Check scalafix
        run: sbt "scalafixAll --check"
      - name: Run tests
        run: sbt test
